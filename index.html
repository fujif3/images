<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像ダウンロード</title>
    <style>
        /* ページ全体を整える（画面の真ん中に寄せる） */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5; /* 薄いグレーの背景 */
        }

        /* ボタンのデザイン */
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff; /* ボタンの青色 */
            color: white;              /* 文字の白色 */
            text-decoration: none;     /* 下線を消す */
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;        /* 角を丸くする */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* 軽い影をつける */
            transition: background-color 0.2s;
        }

        /* マウスを乗せたときに少し暗くする効果 */
        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <a href="photo-fuji.zip" download="photo-fuji.zip" class="download-btn">画像をダウンロードする</a>

</body>
</html>
